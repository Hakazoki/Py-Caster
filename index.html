<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Py-Caster AR - Viseur</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="monster-model" src="assets/dragon_bug.glb"></a-asset-item>
        </a-assets>

        <a-marker type="hiro" id="marker">
            <a-entity id="monster" gltf-model="#monster-model" scale="0.5 0.5 0.5" position="0 0 0"
                animation__shake="property: position; from: 0 0 0; to: 0.1 0 0; dur: 50; loop: 5; startEvents: hit"></a-entity>

            <a-sphere id="spell-effect" radius="0.2" color="orange" visible="false" position="0 1 0"
                animation="property: scale; from: 1 1 1; to: 5 5 5; dur: 500; startEvents: explode"></a-sphere>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Connexion au serveur Flask-SocketIO (IP du conteneur LXC) [cite: 12, 67]
        const socket = io("http://VOTRE_IP_SERVEUR:5000");

        const monster = document.querySelector('#monster');
        const spellEffect = document.querySelector('#spell-effect');

        // Réception de l'ordre visuel instantané 
        socket.on('visual_feedback', (data) => {
            if (data.action === "explosion") {
                // Déclencher l'animation d'impact [cite: 22]
                spellEffect.setAttribute('visible', 'true');
                spellEffect.emit('explode');
                monster.emit('hit');

                // Cacher l'effet après 1 seconde
                setTimeout(() => {
                    spellEffect.setAttribute('visible', 'false');
                    spellEffect.setAttribute('scale', '1 1 1');
                }, 1000);
            }

            if (data.action === "change_color") {
                // Pour la Phase 2 de la Roadmap [cite: 41]
                monster.setAttribute('material', 'color', data.color);
            }
        });

        socket.on('connect', () => {
            console.log("Connecté au Grand Maître du Jeu");
        });
    </script>
</body>

</html>
